name: Deploy Astro Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GISCUS_REPO: ${{ vars.PUBLIC_GISCUS_REPO || secrets.PUBLIC_GISCUS_REPO || vars.GISCUS_REPO || secrets.GISCUS_REPO }}
      PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID || secrets.PUBLIC_GISCUS_REPO_ID || vars.GISCUS_REPO_ID || secrets.GISCUS_REPO_ID }}
      PUBLIC_GISCUS_CATEGORY: ${{ vars.PUBLIC_GISCUS_CATEGORY || secrets.PUBLIC_GISCUS_CATEGORY || vars.GISCUS_CATEGORY || secrets.GISCUS_CATEGORY }}
      PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID || secrets.PUBLIC_GISCUS_CATEGORY_ID || vars.GISCUS_CATEGORY_ID || secrets.GISCUS_CATEGORY_ID }}
      PUBLIC_GISCUS_MAPPING: ${{ vars.PUBLIC_GISCUS_MAPPING || secrets.PUBLIC_GISCUS_MAPPING || vars.GISCUS_MAPPING || secrets.GISCUS_MAPPING }}
      PUBLIC_GISCUS_STRICT: ${{ vars.PUBLIC_GISCUS_STRICT || secrets.PUBLIC_GISCUS_STRICT || vars.GISCUS_STRICT || secrets.GISCUS_STRICT }}
      PUBLIC_GISCUS_REACTIONS_ENABLED: ${{ vars.PUBLIC_GISCUS_REACTIONS_ENABLED || secrets.PUBLIC_GISCUS_REACTIONS_ENABLED || vars.GISCUS_REACTIONS_ENABLED || secrets.GISCUS_REACTIONS_ENABLED }}
      PUBLIC_GISCUS_EMIT_METADATA: ${{ vars.PUBLIC_GISCUS_EMIT_METADATA || secrets.PUBLIC_GISCUS_EMIT_METADATA || vars.GISCUS_EMIT_METADATA || secrets.GISCUS_EMIT_METADATA }}
      PUBLIC_GISCUS_INPUT_POSITION: ${{ vars.PUBLIC_GISCUS_INPUT_POSITION || secrets.PUBLIC_GISCUS_INPUT_POSITION || vars.GISCUS_INPUT_POSITION || secrets.GISCUS_INPUT_POSITION }}
      PUBLIC_GISCUS_THEME: ${{ vars.PUBLIC_GISCUS_THEME || secrets.PUBLIC_GISCUS_THEME || vars.GISCUS_THEME || secrets.GISCUS_THEME }}
      PUBLIC_GISCUS_LANG: ${{ vars.PUBLIC_GISCUS_LANG || secrets.PUBLIC_GISCUS_LANG || vars.GISCUS_LANG || secrets.GISCUS_LANG }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Compute SITE_URL and SITE_BASE
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%/*}"

          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "SITE_URL=https://${REPO_NAME}" >> "$GITHUB_ENV"
            echo "SITE_BASE=/" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${OWNER}.github.io/${REPO_NAME}" >> "$GITHUB_ENV"
            echo "SITE_BASE=/${REPO_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Disable Jekyll on published artifact
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
